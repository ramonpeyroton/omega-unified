name: Push event reminders

# Free external cron (the Vercel Hobby plan only allows once-a-day crons).
# Every 15 minutes this pings our endpoint, which sends "2 hours before" event
# reminders. The endpoint is idempotent (reminder_sent_at dedupes), so an
# occasional double-fire from GitHub's scheduler is harmless.
#
# No secret needed: the ?task=reminders endpoint is intentionally open
# (idempotent, no sensitive data) so this cron runs with zero config. The
# step prints the HTTP status/body for visibility and only fails (emails)
# on a hard 5xx so a real outage still surfaces.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger 2h-before event reminders
        run: |
          code=$(curl -sS -o /tmp/body.txt -w "%{http_code}" \
            "https://omega-unified.vercel.app/api/daily-owner-update?task=reminders")
          echo "HTTP status: $code"
          echo "Response: $(cat /tmp/body.txt)"
          # Only a hard server/network failure should fail the job (and
          # email). Normal operation returns 200; anything < 500 is just
          # printed above for visibility.
          if [ "$code" -ge 500 ]; then
            echo "::error::reminders endpoint returned HTTP $code"
            exit 1
          fi
